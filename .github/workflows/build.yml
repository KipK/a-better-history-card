name: Build

on:
  push:
    branches:
      - "**"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Debug ha-better-history package
        run: |
          npm ls @kipk/ha-better-history
          cat node_modules/@kipk/ha-better-history/package.json
          find node_modules/@kipk/ha-better-history -maxdepth 3 -type f | sort

      - name: Build
        run: npm run build
